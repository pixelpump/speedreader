<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedReader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }
    
    .logo {
      width: 40px;
      height: 40px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 500;
    }
    
    .subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    
    .instructions {
      font-size: 13px;
      line-height: 1.6;
      color: #ccc;
      margin-bottom: 16px;
    }
    
    .instructions ol {
      margin-left: 18px;
      margin-top: 8px;
    }
    
    .instructions li {
      margin-bottom: 4px;
    }
    
    .button {
      display: block;
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    
    .button:hover {
      background: #2563eb;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="SpeedReader" class="logo">
    <div>
      <div class="title">SpeedReader</div>
      <div class="subtitle">Read faster, learn more</div>
    </div>
  </div>
  
  <div class="instructions">
    <strong>How to use:</strong>
    <ol>
      <li>Select text on any webpage</li>
      <li>Right-click the selection</li>
      <li>Click "Send to SpeedReader"</li>
    </ol>
  </div>
  
  <a href="#" id="openReader" class="button">Open SpeedReader</a>
  
  <div class="footer">
    Select text and right-click to speed read
  </div>
  
  <script src="popup.js"></script>
  <script>
    document.getElementById('openReader').addEventListener('click', (e) => {
      e.preventDefault();
      const readerUrl = chrome.runtime.getURL('reader.html');
      chrome.tabs.create({ url: readerUrl });
    });
  </script>
</body>
</html>
